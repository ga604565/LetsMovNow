# Paste this inside your server {} block in /etc/nginx/sites-available/letsmovnow

# Cache static assets aggressively (hashed filenames from Vite build)
location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|webp|ico|gif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Cache html briefly (so updates propagate)
location ~* \.html$ {
    expires 10m;
    add_header Cache-Control "public, must-revalidate";
}

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

# Gzip compression
gzip on;
gzip_vary on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
gzip_min_length 1024;
